<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Kasora.com | Verified Suppliers, Reliable Connections</title>
</head>
<body>
    <div class="promotion-header">
        <p class="header-text">
            New Supplier Promotion: Up to 50% OFF on verified suppliers • Free Samples Available
        </p>
    </div>

    <section class="search-section">
        <div class="search-container">
            <img src="images/" class="logo"> <!--LOGO GOES HEREEEEEEEEE-->

            <div class="search-bar">
                <input class="bar" type="text" placeholder="Search Kasora">
                <button class="search-button">
                    <img src="images/search.png" class="search-icon">
                </button>
            </div>

            <div class="cart-container">
                <button class="cart-button">
                    <img src="images/cart2.png" class="cart-icon">
                    Cart
                </button>
            </div>

            <div class="account-container">
                <button class="account-button">
                    <img src="images/account.png" class="account-icon">
                    Account
                </button>
            </div>
        </div>


        <hr>

        <div class="nav-container">

        </div>

    </section>
</body>
</html>
